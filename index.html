<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- Primary favicon: SVG with sizes="any" so browsers prefer it for any rendered size. -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg?v=3">
    <link rel="mask-icon" href="/favicon.svg?v=3" color="#d47b5f">
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="theme-color" content="#fdfbf7">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Type: Inter only (sans-serif across the entire site). It was declared
         in the design system but previously never loaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">

    <title>Pattern Language — Designing Thriving Rural Communities</title>
    <meta name="description" content="A collaborative tool empowering rural communities to design, plan, and implement innovative solutions to complex challenges. Explore 45+ proven patterns for community-led regeneration.">
    <link rel="canonical" href="https://www.ruralpatternlanguage.com/">

    <!-- Open Graph (LinkedIn, Facebook, Slack, iMessage) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Pattern Language">
    <meta property="og:title" content="Pattern Language — Designing Thriving Rural Communities">
    <meta property="og:description" content="A collaborative tool empowering rural communities to design, plan, and implement innovative solutions to complex challenges.">
    <meta property="og:url" content="https://www.ruralpatternlanguage.com/">
    <meta property="og:image" content="https://www.ruralpatternlanguage.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Pattern Language — Designing Thriving Rural Communities">
    <meta property="og:locale" content="en_US">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pattern Language — Designing Thriving Rural Communities">
    <meta name="twitter:description" content="A collaborative tool empowering rural communities to design, plan, and implement innovative solutions to complex challenges.">
    <meta name="twitter:image" content="https://www.ruralpatternlanguage.com/og-image.png">
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
